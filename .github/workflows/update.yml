name: Update weather ICS

on:
  schedule:
    - cron: "0 5 * * *"   # ~6am Brussels time (UTC+1); ±1h drift in CEST accepted
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run weather generator
        run: python generate.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.ics
          if git diff --cached --quiet; then
            echo "No changes to weather.ics, skipping commit."
          else
            git commit -m "chore: update weather forecast"
            git push
          fi
